{% load moulinette %}

<section class="action-to-take">
  {% if action.details %}
    <button class="action-btn action-btn--clean fr-btn fr-btn--tertiary-no-outline"
            aria-expanded="false"
            aria-controls="action-{{ action.slug }}">
      <span class="fr-icon-arrow-right-line fr-icon--sm" aria-hidden="true"></span>
      {{ action.label }}
      <span class="fr-icon-arrow-down-s-line fr-icon--sm" aria-hidden="true"></span>
    </button>
  {% else %}
    <span class="action-title">
      <span class="fr-icon-arrow-right-line fr-icon--sm">{{ action.label }}</span>
    </span>
  {% endif %}

  <div class="fr-collapse action-details-container"
       id="action-{{ action.slug }}">
    {% if action.details %}
      <p class="fr-ml-5w fr-my-1w">{% include action.details %}</p>
    {% endif %}
  </div>
</section>
