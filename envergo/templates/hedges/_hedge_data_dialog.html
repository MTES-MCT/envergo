<dialog id="{{ dialog_id }}"
        aria-labelledby="{{ dialog_id }}-title"
        role="dialog"
        class="fr-modal hedge-data-dialog{% if dialog_mode != mode %} read-only{% endif %}">
  <div class="fr-container fr-container--fluid fr-container-md">
    <div class="fr-grid-row fr-grid-row--center">
      <div class="fr-col-12 fr-col-md-10 fr-col-xl-9">
        <div class="fr-modal__body">

          <form method="dialog">
            <div class="fr-modal__content fr-pt-4w">
              <div class="hedge-data-dialog-header">
                <h1 id="{{ dialog_id }}-title" class="fr-modal__title fr-mb-1w">
                  Description de la haie <span class="hedge-data-dialog-hedge-name"></span>
                </h1>
                <div class="fr-mb-1w">
                  <span class="hedge-data-dialog-hedge-badges hedge-badge-hru fr-badge fr-badge--sm"
                        style="display: none">Hors procédure unique</span>
                  <span class="hedge-data-dialog-hedge-badges hedge-badge-l350-3 fr-badge fr-badge--green-tilleul-verveine fr-badge--sm"
                        style="display: none">Alignement bord de voie</span>
                </div>
              </div>
              <p class="fr-tag fr-mb-3w">
                Longueur : <span class="hedge-data-dialog-hedge-length"></span> m
              </p>
              {% include '_form_with_fieldsets_snippet.html' with form=form %}
            </div>

            <div class="fr-modal__footer">
              <button type="submit" class="fr-btn">Enregistrer</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</dialog>
